<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="stylesheet" href="_ds/classical-feac7e4c-cf30-4ff4-8ce3-112a9538fe57/styles.css">
  <script src="_ds/classical-feac7e4c-cf30-4ff4-8ce3-112a9538fe57/_ds_bundle.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+Devanagari:wght@500;600&display=swap');
    .mw-utility a { color: inherit; text-decoration: none; }
    .mw-utility a:hover { color: var(--color-accent); }
    .mw-nav-link { color: var(--color-text); text-decoration: none; font-size: 14.5px; white-space: nowrap; }
    .mw-nav-link:hover, .mw-nav-link.is-active { color: var(--color-accent-700); }
    .mw-icon-btn { display: inline-flex; align-items: center; justify-content: center; width: 38px; height: 38px; border-radius: var(--radius-md); color: var(--color-text); background: transparent; border: none; cursor: pointer; text-decoration: none; }
    .mw-icon-btn:hover { background: color-mix(in srgb, var(--color-accent) 10%, transparent); color: var(--color-accent-700); }
    .mw-skip { position: absolute; left: -999px; top: 0; z-index: 1000; background: var(--color-accent); color: #fff; padding: 10px 16px; border-radius: var(--radius-md); text-decoration: none; font-size: 14px; }
    .mw-skip:focus { left: 12px; top: 12px; }
    .mw-hamburger { display: none; }
    .mw-mobile-link { display: block; padding: 13px 0; font-size: 16px; color: var(--color-text); text-decoration: none; border-bottom: 1px solid var(--color-divider); min-height: 44px; }
    .mw-mobile-link:hover, .mw-mobile-link.is-active { color: var(--color-accent-700); }
    @media (max-width: 860px) {
      .mw-nav-links { display: none !important; }
      .mw-hamburger { display: inline-flex !important; }
      .mw-wholesale-cta { display: none !important; }
    }
  </style>
</helmet>
<a class="mw-skip" href="#main-content">Skip to main content</a>
<div style="background: var(--color-neutral-900); color: var(--color-neutral-300);">
  <div class="mw-utility" style="max-width: 1320px; margin: 0 auto; padding: 7px clamp(20px,4vw,56px); display: flex; align-items: center; justify-content: space-between; font-size: 12px; letter-spacing: 0.02em;">
    <span>Pan-India Delivery &nbsp;·&nbsp; Export Worldwide &nbsp;·&nbsp; GST Billing</span>
    <span style="display:flex; gap:18px;"><a href="Contact.dc.html">Track Order</a><a href="Wholesale.dc.html">Dealer Login</a></span>
  </div>
</div>
<div style="background: var(--color-bg); border-bottom: 1px solid var(--color-divider);">
  <div style="max-width: 1320px; margin: 0 auto; padding: 16px clamp(20px,4vw,56px); display: flex; align-items: center; gap: 32px;">
    <a href="Home.dc.html" style="display: flex; align-items: baseline; gap: 8px; text-decoration: none; color: var(--color-text); flex: none;">
      <span style="font-family: var(--font-heading); font-size: 26px; color: var(--color-accent);">ॐ</span>
      <span style="font-family: var(--font-heading); font-weight: 600; font-size: 25px; letter-spacing: -0.01em;">Murtiwallah</span>
    </a>
    <nav class="mw-nav-links" style="display: flex; align-items: center; gap: 26px; flex: 1;">
      <a class="mw-nav-link {{ activeCategories }}" href="Category.dc.html">Categories</a>
      <a class="mw-nav-link {{ activeListing }}" href="ProductListing.dc.html">Shop All</a>
      <a class="mw-nav-link {{ activeWholesale }}" href="Wholesale.dc.html">Wholesale</a>
      <a class="mw-nav-link {{ activeAbout }}" href="AboutUs.dc.html">Craftsmanship</a>
      <a class="mw-nav-link {{ activeBlog }}" href="Blog.dc.html">Journal</a>
      <a class="mw-nav-link {{ activeContact }}" href="Contact.dc.html">Contact</a>
    </nav>
    <div style="display: flex; align-items: center; gap: 4px; flex: none;">
      <a class="mw-icon-btn" href="ProductListing.dc.html" aria-label="Search" title="Search">
        <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      </a>
      <a class="mw-icon-btn" href="Wishlist.dc.html" aria-label="Wishlist" title="Wishlist">
        <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>
      </a>
      <a class="mw-icon-btn" href="Cart.dc.html" aria-label="Cart, 2 items" title="Cart" style="position: relative;">
        <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 2-1.58l1.65-7.42H5.12"/></svg>
        <span aria-hidden="true" style="position: absolute; top: 2px; right: 2px; width: 15px; height: 15px; border-radius: 50%; background: var(--color-accent); color: #fff; font-size: 9px; display: flex; align-items: center; justify-content: center; font-weight: 600;">2</span>
      </a>
      <a href="Wholesale.dc.html" class="btn btn-primary mw-wholesale-cta" style="margin-left: 8px; white-space: nowrap;">Get Wholesale Quote</a>
      <a class="mw-icon-btn" href="AdminDashboard.dc.html" aria-label="Admin dashboard" title="Admin">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      </a>
      <button type="button" class="mw-icon-btn mw-hamburger" aria-label="Open menu" aria-expanded="{{ mobileOpen }}" aria-controls="mw-mobile-panel" onClick="{{ toggleMobile }}">
        <svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M4 7h16M4 12h16M4 17h16"/></svg>
      </button>
    </div>
  </div>
  <sc-if value="{{ mobileOpen }}" hint-placeholder-val="{{ false }}">
    <nav id="mw-mobile-panel" style="border-top: 1px solid var(--color-divider); padding: 6px clamp(20px,4vw,56px) 18px;">
      <a class="mw-mobile-link" href="Category.dc.html">Categories</a>
      <a class="mw-mobile-link" href="ProductListing.dc.html">Shop All</a>
      <a class="mw-mobile-link" href="Wholesale.dc.html">Wholesale</a>
      <a class="mw-mobile-link" href="AboutUs.dc.html">Craftsmanship</a>
      <a class="mw-mobile-link" href="Blog.dc.html">Journal</a>
      <a class="mw-mobile-link" href="Contact.dc.html" style="border-bottom: none;">Contact</a>
      <a href="Wholesale.dc.html" class="btn btn-primary btn-block" style="margin-top: 14px;">Get Wholesale Quote</a>
    </nav>
  </sc-if>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;active&quot;: {&quot;editor&quot;: &quot;enum&quot;, &quot;default&quot;: &quot;home&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;options&quot;: [&quot;home&quot;,&quot;categories&quot;,&quot;listing&quot;,&quot;wholesale&quot;,&quot;about&quot;,&quot;blog&quot;,&quot;contact&quot;]}}">
class Component extends DCLogic {
  state = { mobileOpen: false };
  renderVals() {
    const active = this.props.active || '';
    const cls = (name) => active === name ? 'is-active' : '';
    return {
      activeCategories: cls('categories'),
      activeListing: cls('listing'),
      activeWholesale: cls('wholesale'),
      activeAbout: cls('about'),
      activeBlog: cls('blog'),
      activeContact: cls('contact'),
      mobileOpen: this.state.mobileOpen,
      toggleMobile: () => this.setState(s => ({ mobileOpen: !s.mobileOpen })),
    };
  }
}
</script>
</body>
</html>
