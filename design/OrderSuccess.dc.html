<!DOCTYPE html>

<body>
<x-dc>
<helmet>

    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+Devanagari:wght@500;600&display=swap');
    body { margin: 0; text-wrap: pretty; }
    .mw-wrap { max-width: 900px; margin: 0 auto; padding: 0 clamp(20px,4vw,56px); }
    .mw-kicker { font-family: 'Noto Serif Devanagari', var(--font-heading); font-size: 14px; letter-spacing: 0.06em; color: var(--color-accent-700); margin: 0 0 10px; }
    .mw-check-circle { width: 68px; height: 68px; border-radius: 50%; border: 2px solid var(--color-accent); display: flex; align-items: center; justify-content: center; margin: 0 auto 26px; color: var(--color-accent-700); }
    .mw-summary-row { display: flex; justify-content: space-between; font-size: 14px; padding: 8px 0; }
  </style>
</helmet>
<dc-import name="Header" hint-size="100%,100px"></dc-import>
<main id="main-content">

<section style="padding: 76px 0 90px; text-align: center;">
  <div class="mw-wrap">
    <div class="mw-check-circle"><svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></div>
    <p class="mw-kicker" style="justify-content: center; display: flex;">धन्यवाद — Thank You</p>
    <h1 style="margin: 0 0 10px;">Your Order Is Confirmed</h1>
    <p style="font-size: 15.5px; color: color-mix(in srgb, var(--color-text) 68%, transparent); margin: 0 0 30px;">Order #MW-20260723-4471 · A confirmation has been sent to your email.</p>

    <div class="card elev-sm" style="padding: 26px; text-align: left; max-width: 460px; margin: 0 auto 30px;">
      <div class="mw-summary-row"><span>Order Number</span><span>MW-20260723-4471</span></div>
      <div class="mw-summary-row"><span>Estimated Delivery</span><span>29 Jul – 31 Jul 2026</span></div>
      <div class="mw-summary-row"><span>Payment Method</span><span>UPI</span></div>
      <hr class="hr" style="margin: 10px 0;" />
      <div class="mw-summary-row" style="font-family: var(--font-heading); font-weight: 600; font-size: 17px;"><span>Total Paid</span><span>₹45,194</span></div>
    </div>

    <div style="display: flex; gap: 14px; justify-content: center; flex-wrap: wrap;">
      <a href="OrderTracking.dc.html" class="btn btn-primary" style="padding: 13px 26px;">Track Your Order</a>
      <a href="ProductListing.dc.html" class="btn btn-secondary" style="padding: 13px 26px;">Continue Shopping</a>
    </div>
